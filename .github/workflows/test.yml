name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, 'release/**']

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit -v --cov=naas --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run integration tests
        run: uv run pytest tests/integration -v --tb=short --no-cov

      - name: Cleanup Docker
        if: always()
        run: docker compose -f tests/integration/docker-compose.test.yml down -v

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run contract tests
        run: uv run pytest tests/contract -v --tb=short --no-cov

  k8s-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: k3d cluster create naas-test --wait

      - name: Build NAAS image
        run: docker build -t naas:test .

      - name: Load image into k3d
        run: k3d image import naas:test -c naas-test

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/api/
          kubectl apply -f k8s/worker/

      - name: Create secret
        run: |
          kubectl -n naas create secret generic naas-secret \
            --from-literal=REDIS_PASSWORD=test-redis-pw

      - name: Swap image to local build
        run: |
          kubectl -n naas set image deployment/naas-api naas-api=naas:test
          kubectl -n naas set image deployment/naas-worker naas-worker=naas:test
          kubectl -n naas patch deployment naas-api -p '{"spec":{"template":{"spec":{"containers":[{"name":"naas-api","imagePullPolicy":"Never"}]}}}}'
          kubectl -n naas patch deployment naas-worker -p '{"spec":{"template":{"spec":{"containers":[{"name":"naas-worker","imagePullPolicy":"Never"}]}}}}'

      - name: Wait for pods
        run: kubectl -n naas wait --for=condition=ready pod --all --timeout=120s

      - name: Smoke test healthcheck
        run: |
          kubectl -n naas port-forward svc/naas-api 8443:443 &
          sleep 3
          curl -k -f https://localhost:8443/healthcheck

      - name: Cleanup
        if: always()
        run: k3d cluster delete naas-test

  tests-summary:
    name: Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, contract-tests, k8s-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "failure" || "${{ needs.unit-tests.result }}" == "cancelled" ]]; then
            echo "Unit tests failed or were cancelled"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" == "failure" || "${{ needs.integration-tests.result }}" == "cancelled" ]]; then
            echo "Integration tests failed or were cancelled"
            exit 1
          fi
          if [[ "${{ needs.contract-tests.result }}" == "failure" || "${{ needs.contract-tests.result }}" == "cancelled" ]]; then
            echo "Contract tests failed or were cancelled"
            exit 1
          fi
          if [[ "${{ needs.k8s-tests.result }}" == "failure" || "${{ needs.k8s-tests.result }}" == "cancelled" ]]; then
            echo "k8s tests failed or were cancelled"
            exit 1
          fi
