name: Sync Release to Develop

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-to-develop:
    runs-on: ubuntu-latest
    # Only run for final releases (not pre-releases like v1.3.0b1, v1.3.0rc1)
    if: "!contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc')"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create PR to develop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --base develop --head main --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, skipping"
            exit 0
          fi

          # Create PR
          gh pr create \
            --base develop \
            --head main \
            --title "chore: sync v${VERSION} release back to develop" \
            --body "Automated PR to sync release v${VERSION} from main back to develop. After merging, manually bump develop to the next alpha version."

  bump-develop:
    runs-on: ubuntu-latest
    needs: sync-to-develop
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Bump develop to next alpha
        run: |
          # Extract current version from tag
          VERSION="${GITHUB_REF_NAME#v}"

          # Calculate next minor version
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0a1"

          # Update pyproject.toml
          sed -i "s/version = \".*\"/version = \"${NEXT_VERSION}\"/" pyproject.toml
          uv lock

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          git commit -m "chore: bump develop to v${NEXT_VERSION}"
          git push
