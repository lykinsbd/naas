services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass test_password
    ports:
      - "16379:6379"
    networks:
      - naas-test
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "18443:443"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=test_password
      - APP_ENVIRONMENT=test
      - NAAS_CONTEXTS=default,alt
      - GUNICORN_WORKERS=2
      - WEB_CONCURRENCY=2
    networks:
      - naas-test
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:443/healthcheck"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["rq", "worker", "naas-default", "--url", "redis://:test_password@redis:6379"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=test_password
      - APP_ENVIRONMENT=test
      - WORKER_CONTEXTS=default
      - WEBHOOK_ALLOW_HTTP=true
    networks:
      - naas-test
    depends_on:
      redis:
        condition: service_healthy

  worker-alt:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["rq", "worker", "naas-alt", "--url", "redis://:test_password@redis:6379"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=test_password
      - APP_ENVIRONMENT=test
      - WORKER_CONTEXTS=alt
      - WEBHOOK_ALLOW_HTTP=true
    networks:
      - naas-test
    depends_on:
      redis:
        condition: service_healthy

  cisshgo:
    image: ghcr.io/tbotnz/cisshgo:v0.2.0
    command: ["-listeners", "2", "-startingPort", "10022"]
    ports:
      - "10022:10022"
      - "10023:10023"
    networks:
      naas-test:
        ipv4_address: 240.11.2.100

  webhook-tester:
    image: ghcr.io/tarampampam/webhook-tester:2
    command: ["start", "--port", "8080", "--auto-create-sessions"]
    ports:
      - "18080:8080"
    networks:
      - naas-test
    healthcheck:
      test: ["CMD", "/app", "start", "healthcheck", "--port", "8080"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 3s

networks:
  naas-test:
    ipam:
      config:
        - subnet: 240.11.2.0/24
